name: Run Daily Weather Cloud Pipeline

on:
  schedule:
    - cron: '0 6 * * *'  # Automatically triggers every day at 6:00 AM UTC
  workflow_dispatch:     # Allows you to click a button to run it manually anytime

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/init-python@v4
        with:
          python-version: '3.9'

      - name: Install Project Dependencies
        run: |
          pip install requests pandas pyarrow boto3

      - name: Execute Pipeline Script
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: python weather_pipeline.py